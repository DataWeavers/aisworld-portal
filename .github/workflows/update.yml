name: Update AISWORLD digest

on:
  schedule:
    - cron: '0 12 * * *'   # daily at 12:00 UTC — adjust to taste
  workflow_dispatch: {}     # lets you trigger a manual run from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Fetch and rebuild data.json
        run: npm run fetch
        working-directory: .

      - name: Commit updated data
        run: |
          git config user.name "aisworld-portal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data.json
          git diff --cached --quiet || git commit -m "chore: update AISWORLD digest data"
          git push
